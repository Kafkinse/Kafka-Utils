name: Build Kafka-Utils Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Можете запустить вручную из вкладки Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kafkautils-v1.2.0
          path: build/libs/*.jar
